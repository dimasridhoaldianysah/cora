subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace project.group
                }
                // Force compileSdkVersion for all plugins to fix
                // "android:attr/lStar not found" and similar resource errors
                compileSdkVersion 36
            }
        }
    }
}
